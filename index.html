<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1008" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>Abyssal Depths</title>
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;
      var h = location.hostname;
      if (h !== 'localhost' && h !== '127.0.0.1' && h !== '[::1]') return;
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw; height: 100vh; height: 100dvh;
      background: #000; overflow: hidden; touch-action: none;
      position: fixed; inset: 0;
    }

    /* ── Desktop: game fills the viewport ── */
    #mobile-wrapper {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    #ctrl-left, #ctrl-right { display: none; }
    #game-container {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      flex: 1; min-width: 0;
    }
    #game-container canvas {
      image-rendering: pixelated;
      display: block;
    }

    /* ── Touch controls (hidden by default, shown on mobile) ── */
    #touch-controls { display: none; }
    #touch-controls.visible { display: contents; }

    /* ── Shared button styles ── */
    .touch-btn {
      pointer-events: auto;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-weight: bold;
      color: rgba(68,255,102,0.55);
      text-shadow: 0 0 6px rgba(68,255,102,0.3);
      background: rgba(26,16,8,0.55);
      border: 2px solid rgba(68,255,102,0.25);
      transition: background 0.08s, border-color 0.08s;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .touch-btn.active {
      background: rgba(68,255,102,0.18);
      border-color: rgba(68,255,102,0.55);
      color: rgba(68,255,102,0.9);
    }

    /* ── Virtual joystick ── */
    .stick-zone {
      width: 70%;
      max-width: 180px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(26,16,8,0.40);
      border: 2px solid rgba(68,255,102,0.18);
      pointer-events: auto;
      touch-action: none;
      position: relative;
    }
    .stick-knob {
      position: absolute;
      width: 40%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(68,255,102,0.2);
      border: 2px solid rgba(68,255,102,0.45);
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: background 0.06s;
    }
    .stick-zone.active .stick-knob {
      background: rgba(68,255,102,0.38);
      border-color: rgba(68,255,102,0.7);
    }

    /* ── Pause button ── */
    #btn-pause {
      width: 52px; height: 52px;
      font-size: 18px;
      border-radius: 14px;
      pointer-events: auto;
    }

    /* ── Mobile: side panels visible ── */
    body.mobile-layout #mobile-wrapper {
      flex-direction: row;
      align-items: stretch;
    }
    body.mobile-layout #ctrl-left,
    body.mobile-layout #ctrl-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #050508;
      z-index: 10;
      padding: 8px;
      gap: 10px;
      flex-shrink: 0;
    }
    body.mobile-layout #ctrl-left {
      width: 22vw;
      max-width: 180px;
      min-width: 110px;
    }
    body.mobile-layout #ctrl-right {
      width: 22vw;
      max-width: 180px;
      min-width: 110px;
    }
    body.mobile-layout #game-container {
      border-left: 1px solid rgba(68,255,102,0.08);
      border-right: 1px solid rgba(68,255,102,0.08);
    }

    /* Action buttons in right panel */
    .action-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }
    .action-panel .touch-btn {
      width: 70%;
      max-width: 100px;
      aspect-ratio: 1;
      font-size: 14px;
      letter-spacing: 0.5px;
      position: relative;
    }

    /* Landscape small phones: tighter panels */
    @media (max-height: 400px) {
      body.mobile-layout #ctrl-left,
      body.mobile-layout #ctrl-right {
        padding: 4px;
        gap: 6px;
        min-width: 90px;
      }
      .action-panel { gap: 6px; }
      .action-panel .touch-btn { font-size: 12px; }
      #btn-pause { width: 42px; height: 42px; font-size: 15px; }
    }

    /* Portrait mode: top/bottom layout */
    @media (orientation: portrait) {
      body.mobile-layout #mobile-wrapper {
        flex-direction: column;
      }
      body.mobile-layout #ctrl-left,
      body.mobile-layout #ctrl-right {
        width: 100%;
        max-width: none;
        min-width: unset;
        height: 18vh;
        max-height: 140px;
        min-height: 80px;
        flex-direction: row;
        justify-content: center;
        padding: 6px 16px;
      }
      body.mobile-layout #game-container {
        border-left: none;
        border-right: none;
        border-top: 1px solid rgba(68,255,102,0.08);
        border-bottom: 1px solid rgba(68,255,102,0.08);
      }
      .stick-zone { max-width: 120px; }
      .action-panel {
        flex-direction: row;
        width: auto;
      }
      .action-panel .touch-btn {
        width: auto;
        height: 80%;
        max-width: 80px;
        aspect-ratio: 1;
      }
    }
  </style>
</head>
<body>
  <div id="mobile-wrapper">
    <div id="ctrl-left"></div>
    <div id="game-container" tabindex="0" aria-label="Game"></div>
    <div id="ctrl-right"></div>
  </div>

  <div id="touch-controls">
    <div id="stick-zone" class="stick-zone">
      <div id="stick-knob" class="stick-knob"></div>
    </div>
    <div class="action-panel">
      <div id="btn-jump" class="touch-btn" data-btn="jump">JUMP</div>
      <div id="btn-slash" class="touch-btn" data-btn="slash">ATK</div>
      <div id="btn-dash" class="touch-btn" data-btn="dash">DASH</div>
    </div>
    <div id="btn-pause" class="touch-btn" data-btn="pause">❚❚</div>
  </div>

  <script type="module" src="/src/main.js"></script>

  <script>
    // Apply mobile layout early so side panels appear before Phaser loads
    (function() {
      var ua = navigator.userAgent || '';
      var isMobile = /Android|iPhone|iPad|iPod|Mobile|Tablet/i.test(ua) ||
        ('ontouchstart' in window && navigator.maxTouchPoints > 1);
      if (isMobile) document.body.classList.add('mobile-layout');
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      const h = location.hostname;
      const isDevHost = h === 'localhost' || h === '127.0.0.1' || h === '[::1]';
      if (!isDevHost) navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
