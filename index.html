<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1008" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>Abyssal Depths</title>
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;
      var h = location.hostname;
      if (h !== 'localhost' && h !== '127.0.0.1' && h !== '[::1]') return;
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw; height: 100vh; height: 100dvh;
      background: #000; overflow: hidden; touch-action: none;
      position: fixed; inset: 0;
    }
    #game-container {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      position: absolute; inset: 0;
    }
    #game-container canvas {
      image-rendering: pixelated;
      display: block;
    }

    /* ── On-screen touch gamepad ── */
    #touch-controls {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    #touch-controls.visible { display: block; }

    .touch-btn {
      position: absolute;
      pointer-events: auto;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-weight: bold;
      color: rgba(68,255,102,0.55);
      text-shadow: 0 0 6px rgba(68,255,102,0.3);
      background: rgba(26,16,8,0.45);
      border: 2px solid rgba(68,255,102,0.25);
      transition: background 0.08s, border-color 0.08s;
    }
    .touch-btn.active {
      background: rgba(68,255,102,0.18);
      border-color: rgba(68,255,102,0.55);
      color: rgba(68,255,102,0.9);
    }

    /* Big left/right movement buttons (top-left in landscape, bottom-left in portrait) */
    .move-container {
      position: absolute;
      top: 14px;
      left: 14px;
    }
    #move-left, #move-right {
      width: 78px; height: 64px;
      border-radius: 14px;
      font-size: 30px;
      position: absolute;
    }
    #move-left  { left: 0; top: 0; }
    #move-right { left: 86px; top: 0; }

    /* D-pad (up/down sit below the move buttons in landscape) */
    .dpad-container {
      position: absolute;
      top: 88px;
      left: 14px;
    }
    .dpad-container .touch-btn { width: 56px; height: 56px; font-size: 22px; }
    #dpad-up    { left: 54px; top: 0; }
    #dpad-down  { left: 54px; top: 64px; }
    #dpad-left  { display: none; }
    #dpad-right { display: none; }

    /* Pause button (top-right) */
    #btn-pause {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 44px;
      height: 44px;
      font-size: 16px;
      border-radius: 10px;
      pointer-events: auto;
    }

    /* Action buttons */
    .action-container {
      position: absolute;
      bottom: 20px;
      right: 20px;
    }
    .action-container .touch-btn { width: 60px; height: 60px; font-size: 13px; letter-spacing: 0.5px; }
    #btn-jump  { right: 64px; bottom: 112px; }
    #btn-slash { right: 128px; bottom: 48px; }
    #btn-dash  { right: 0; bottom: 48px; }

    /* Landscape small phones: tighter spacing */
    @media (max-height: 400px) {
      .move-container { top: 8px; left: 8px; }
      #move-left, #move-right { width: 62px; height: 52px; font-size: 24px; }
      #move-right { left: 68px; }

      .dpad-container { top: 68px; left: 8px; }
      .dpad-container .touch-btn { width: 44px; height: 44px; font-size: 18px; }
      #dpad-up    { left: 44px; top: 0; }
      #dpad-down  { left: 44px; top: 52px; }

      .action-container { bottom: 8px; right: 8px; }
      .action-container .touch-btn { width: 48px; height: 48px; font-size: 11px; }
      #btn-jump  { right: 52px; bottom: 90px; }
      #btn-slash { right: 104px; bottom: 38px; }
      #btn-dash  { right: 0; bottom: 38px; }
    }

    /* Portrait mode: controls near bottom, spaced for thumbs */
    @media (orientation: portrait) {
      .move-container { top: auto; bottom: 18px; left: 12px; }
      #move-left, #move-right { width: 74px; height: 60px; font-size: 28px; }
      #move-right { left: 82px; }

      .dpad-container { top: auto; bottom: 88px; left: 12px; }
      .dpad-container .touch-btn { width: 52px; height: 52px; font-size: 20px; }
      #dpad-up    { left: 50px; top: 0; }
      #dpad-down  { left: 50px; top: 60px; }

      .action-container { bottom: 24px; right: 12px; }
      .action-container .touch-btn { width: 56px; height: 56px; font-size: 12px; }
      #btn-jump  { right: 60px; bottom: 106px; }
      #btn-slash { right: 120px; bottom: 44px; }
      #btn-dash  { right: 0; bottom: 44px; }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <div id="touch-controls">
    <div class="dpad-container">
      <div id="dpad-up" class="touch-btn" data-btn="up">▲</div>
      <div id="dpad-down" class="touch-btn" data-btn="down">▼</div>
      <div id="dpad-left" class="touch-btn" data-btn="left">◀</div>
      <div id="dpad-right" class="touch-btn" data-btn="right">▶</div>
    </div>
    <div class="move-container">
      <div id="move-left" class="touch-btn" data-btn="left">◀</div>
      <div id="move-right" class="touch-btn" data-btn="right">▶</div>
    </div>
    <div class="action-container">
      <div id="btn-jump" class="touch-btn" data-btn="jump">JUMP</div>
      <div id="btn-slash" class="touch-btn" data-btn="slash">ATK</div>
      <div id="btn-dash" class="touch-btn" data-btn="dash">DASH</div>
    </div>
    <div id="btn-pause" class="touch-btn" data-btn="pause">❚❚</div>
  </div>

  <script type="module" src="/src/main.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      const h = location.hostname;
      const isDevHost = h === 'localhost' || h === '127.0.0.1' || h === '[::1]';
      if (!isDevHost) navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
