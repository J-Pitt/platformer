<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1008" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>Abyssal Depths</title>
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;
      var h = location.hostname;
      if (h !== 'localhost' && h !== '127.0.0.1' && h !== '[::1]') return;
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw; height: 100vh; height: 100dvh;
      background: #000; overflow: hidden; touch-action: none;
      position: fixed; inset: 0;
    }
    #game-container {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      position: absolute; inset: 0;
    }
    #game-container canvas {
      image-rendering: pixelated;
      display: block;
    }

    /* ── On-screen touch gamepad ── */
    #touch-controls {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    #touch-controls.visible { display: block; }

    .touch-btn {
      position: absolute;
      pointer-events: auto;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-weight: bold;
      color: rgba(68,255,102,0.55);
      text-shadow: 0 0 6px rgba(68,255,102,0.3);
      background: rgba(26,16,8,0.45);
      border: 2px solid rgba(68,255,102,0.25);
      transition: background 0.08s, border-color 0.08s;
    }
    .touch-btn.active {
      background: rgba(68,255,102,0.18);
      border-color: rgba(68,255,102,0.55);
      color: rgba(68,255,102,0.9);
    }

    /* Big left/right movement buttons (top-left in landscape, bottom-left in portrait) */
    .move-container {
      position: absolute;
      top: 12px;
      left: 12px;
    }
    #move-left, #move-right {
      width: 124px; height: 100px;
      border-radius: 20px;
      font-size: 42px;
      position: absolute;
    }
    #move-left  { left: 0; top: 0; }
    #move-right { left: 132px; top: 0; }

    /* D-pad (up/down sit below the move buttons in landscape) */
    .dpad-container {
      position: absolute;
      top: 120px;
      left: 12px;
    }
    .dpad-container .touch-btn { width: 94px; height: 94px; font-size: 32px; }
    #dpad-up    { left: 81px; top: 0; }
    #dpad-down  { left: 81px; top: 102px; }
    #dpad-left  { display: none; }
    #dpad-right { display: none; }

    /* Pause button (top-right) */
    #btn-pause {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 78px;
      height: 78px;
      font-size: 24px;
      border-radius: 16px;
      pointer-events: auto;
    }

    /* Action buttons */
    .action-container {
      position: absolute;
      bottom: 16px;
      right: 16px;
    }
    .action-container .touch-btn { width: 112px; height: 112px; font-size: 17px; letter-spacing: 0.5px; }
    #btn-jump  { right: 62px; bottom: 192px; }
    #btn-slash { right: 124px; bottom: 52px; }
    #btn-dash  { right: 0; bottom: 52px; }

    /* Landscape small phones: tighter spacing */
    @media (max-height: 400px) {
      .move-container { top: 6px; left: 6px; }
      #move-left, #move-right { width: 100px; height: 82px; font-size: 34px; }
      #move-right { left: 108px; }

      .dpad-container { top: 96px; left: 6px; }
      .dpad-container .touch-btn { width: 78px; height: 78px; font-size: 26px; }
      #dpad-up    { left: 65px; top: 0; }
      #dpad-down  { left: 65px; top: 86px; }

      .action-container { bottom: 6px; right: 6px; }
      .action-container .touch-btn { width: 92px; height: 92px; font-size: 13px; }
      #btn-jump  { right: 52px; bottom: 156px; }
      #btn-slash { right: 104px; bottom: 40px; }
      #btn-dash  { right: 0; bottom: 40px; }

      #btn-pause { top: 6px; right: 6px; width: 68px; height: 68px; font-size: 18px; }
    }

    /* Portrait mode: controls near bottom, spaced for thumbs */
    @media (orientation: portrait) {
      .move-container { top: auto; bottom: 16px; left: 10px; }
      #move-left, #move-right { width: 120px; height: 96px; font-size: 38px; }
      #move-right { left: 128px; }

      .dpad-container { top: auto; bottom: 128px; left: 10px; }
      .dpad-container .touch-btn { width: 90px; height: 90px; font-size: 30px; }
      #dpad-up    { left: 79px; top: 0; }
      #dpad-down  { left: 79px; top: 98px; }

      .action-container { bottom: 20px; right: 10px; }
      .action-container .touch-btn { width: 108px; height: 108px; font-size: 15px; }
      #btn-jump  { right: 60px; bottom: 184px; }
      #btn-slash { right: 122px; bottom: 48px; }
      #btn-dash  { right: 0; bottom: 48px; }

      #btn-pause { top: 10px; right: 10px; width: 78px; height: 78px; font-size: 22px; }
    }
  </style>
</head>
<body>
  <div id="game-container" tabindex="0" aria-label="Game"></div>

  <div id="touch-controls">
    <div class="dpad-container">
      <div id="dpad-up" class="touch-btn" data-btn="up">▲</div>
      <div id="dpad-down" class="touch-btn" data-btn="down">▼</div>
      <div id="dpad-left" class="touch-btn" data-btn="left">◀</div>
      <div id="dpad-right" class="touch-btn" data-btn="right">▶</div>
    </div>
    <div class="move-container">
      <div id="move-left" class="touch-btn" data-btn="left">◀</div>
      <div id="move-right" class="touch-btn" data-btn="right">▶</div>
    </div>
    <div class="action-container">
      <div id="btn-jump" class="touch-btn" data-btn="jump">JUMP</div>
      <div id="btn-slash" class="touch-btn" data-btn="slash">ATK</div>
      <div id="btn-dash" class="touch-btn" data-btn="dash">DASH</div>
    </div>
    <div id="btn-pause" class="touch-btn" data-btn="pause">❚❚</div>
  </div>

  <script type="module" src="/src/main.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      const h = location.hostname;
      const isDevHost = h === 'localhost' || h === '127.0.0.1' || h === '[::1]';
      if (!isDevHost) navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
