<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1008" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>Abyssal Depths</title>
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;
      var h = location.hostname;
      if (h !== 'localhost' && h !== '127.0.0.1' && h !== '[::1]') return;
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
    })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw; height: 100vh; height: 100dvh;
      background: #000; overflow: hidden; touch-action: none;
      position: fixed; inset: 0;
    }
    #game-container {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      position: absolute; inset: 0;
    }
    #game-container canvas {
      image-rendering: pixelated;
      display: block;
    }

    /* ── On-screen touch gamepad ── */
    #touch-controls {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    #touch-controls.visible { display: block; }

    .touch-btn {
      position: absolute;
      pointer-events: auto;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-weight: bold;
      color: rgba(68,255,102,0.55);
      text-shadow: 0 0 6px rgba(68,255,102,0.3);
      background: rgba(26,16,8,0.45);
      border: 2px solid rgba(68,255,102,0.25);
      transition: background 0.08s, border-color 0.08s;
    }
    .touch-btn.active {
      background: rgba(68,255,102,0.18);
      border-color: rgba(68,255,102,0.55);
      color: rgba(68,255,102,0.9);
    }

    /* Big left/right movement buttons — REMOVED, replaced by stick zone */

    /* ── Virtual joystick ── */
    .stick-zone {
      position: absolute;
      bottom: 16px;
      left: 16px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(26,16,8,0.32);
      border: 2px solid rgba(68,255,102,0.18);
      pointer-events: auto;
      touch-action: none;
    }
    .stick-knob {
      position: absolute;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(68,255,102,0.2);
      border: 2px solid rgba(68,255,102,0.45);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: background 0.06s;
    }
    .stick-zone.active .stick-knob {
      background: rgba(68,255,102,0.38);
      border-color: rgba(68,255,102,0.7);
    }

    /* Pause button (top-right) */
    #btn-pause {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 78px;
      height: 78px;
      font-size: 24px;
      border-radius: 16px;
      pointer-events: auto;
    }

    /* Action buttons */
    .action-container {
      position: absolute;
      bottom: 16px;
      right: 16px;
    }
    .action-container .touch-btn { width: 112px; height: 112px; font-size: 17px; letter-spacing: 0.5px; }
    #btn-jump  { right: 62px; bottom: 192px; }
    #btn-slash { right: 124px; bottom: 52px; }
    #btn-dash  { right: 0; bottom: 52px; }

    /* Landscape small phones: tighter spacing */
    @media (max-height: 400px) {
      .stick-zone { bottom: 6px; left: 6px; width: 160px; height: 160px; }
      .stick-knob { width: 58px; height: 58px; }

      .action-container { bottom: 6px; right: 6px; }
      .action-container .touch-btn { width: 92px; height: 92px; font-size: 13px; }
      #btn-jump  { right: 52px; bottom: 156px; }
      #btn-slash { right: 104px; bottom: 40px; }
      #btn-dash  { right: 0; bottom: 40px; }

      #btn-pause { top: 6px; right: 6px; width: 68px; height: 68px; font-size: 18px; }
    }

    /* Portrait mode: controls near bottom, spaced for thumbs */
    @media (orientation: portrait) {
      .stick-zone { bottom: 24px; left: 14px; width: 210px; height: 210px; }
      .stick-knob { width: 76px; height: 76px; }

      .action-container { bottom: 20px; right: 10px; }
      .action-container .touch-btn { width: 108px; height: 108px; font-size: 15px; }
      #btn-jump  { right: 60px; bottom: 184px; }
      #btn-slash { right: 122px; bottom: 48px; }
      #btn-dash  { right: 0; bottom: 48px; }

      #btn-pause { top: 10px; right: 10px; width: 78px; height: 78px; font-size: 22px; }
    }
  </style>
</head>
<body>
  <div id="game-container" tabindex="0" aria-label="Game"></div>

  <div id="touch-controls">
    <div id="stick-zone" class="stick-zone">
      <div id="stick-knob" class="stick-knob"></div>
    </div>
    <div class="action-container">
      <div id="btn-jump" class="touch-btn" data-btn="jump">JUMP</div>
      <div id="btn-slash" class="touch-btn" data-btn="slash">ATK</div>
      <div id="btn-dash" class="touch-btn" data-btn="dash">DASH</div>
    </div>
    <div id="btn-pause" class="touch-btn" data-btn="pause">❚❚</div>
  </div>

  <script type="module" src="/src/main.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      const h = location.hostname;
      const isDevHost = h === 'localhost' || h === '127.0.0.1' || h === '[::1]';
      if (!isDevHost) navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
